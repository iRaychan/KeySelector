<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KeySelector - CHC Series</title>
<style>
:root{--blue:#0f629c;--dark:#15384f;--line:#d8e3ea;--muted:#687b89;--red:#d34242;--green:#198754}
*{box-sizing:border-box}
body{margin:0;background:#eef3f7;color:#203542;font-family:Arial,sans-serif}
header{background:#ffffff;color:#15384f;padding:17px 28px;border-bottom:4px solid #0f629c;box-shadow:0 3px 12px rgba(20,54,79,.08)}
header h1{margin:0 0 5px;font-size:25px}header p{margin:0;opacity:.9}
main{max-width:1220px;margin:20px auto;padding:0 15px;display:grid;grid-template-columns:330px 1fr;gap:17px}
.card{background:white;border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 5px 18px rgba(20,54,79,.06)}
label{font-weight:700;display:block;margin:13px 0 6px}
.row{display:grid;grid-template-columns:1fr 92px;gap:8px}
input,select,button{width:100%;padding:10px;border:1px solid #bbc9d4;border-radius:8px;font-size:15px}
button{margin-top:17px;background:var(--blue);color:#fff;border:0;font-weight:800;cursor:pointer}
.small{font-size:12px;color:var(--muted);line-height:1.45}
.warning{background:#fff5dc;border:1px solid #eed18c;color:#745315;padding:10px;border-radius:8px;margin-top:12px}
.ok{background:#eaf7ef;border:1px solid #a9d8ba;color:#22623b;padding:10px;border-radius:8px;margin-top:12px}
.heading{display:flex;justify-content:space-between;gap:12px}
.heading-actions{display:flex;align-items:flex-start;gap:8px}
.export-btn{
  width:auto;
  margin:0;
  padding:8px 12px;
  border-radius:8px;
  background:#198754;
  font-size:12px;
  white-space:nowrap;
}.badge{background:#e7f2fa;color:#075d91;padding:7px 10px;border-radius:999px;height:max-content;font-weight:800;font-size:12px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:14px 0}
.kpi{border:1px solid var(--line);border-radius:10px;padding:10px}.kpi span{display:block;font-size:11px;color:var(--muted)}.kpi b{font-size:18px;display:block;margin:4px 0}
.chart-title{font-weight:800;margin:18px 0 7px}
svg{display:block;width:100%;height:auto;aspect-ratio:700/270;margin:10px 0 14px;border:1px solid var(--line);background:#fbfcfe;border-radius:11px}
.eq{font-size:11px;color:#73828f;margin-top:5px}
.alt{width:100%;border-collapse:collapse;font-size:13px}.alt th,.alt td{padding:8px;border-bottom:1px solid #e7edf2}.alt th{text-align:left}.alt td.num,.alt th.num{text-align:right}
.alternatives-panel{margin-top:18px}
.alternatives-panel h3{margin:0 0 8px}
.alt-card{border:1px solid var(--line);border-radius:10px;padding:10px;margin:8px 0;cursor:pointer;background:#fbfcfe;transition:.15s}
.alt-card:hover{border-color:#6ca6cc;background:#f1f8fc}
.alt-card.active{border:2px solid var(--blue);background:#eaf4fb}
.alt-card .alt-top{display:flex;justify-content:space-between;gap:8px;font-weight:800}
.alt-card .alt-meta{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;margin-top:7px;font-size:12px;color:#506574}
.alt-card .positive{color:#198754}.alt-card .negative{color:#c73d3d}
@media(max-width:850px){main{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}
.iso-note{
  margin-top:14px;
  padding-top:8px;
  border-top:1px solid #e7edf1;
  font-size:10px;
  font-weight:500;
  color:#8a98a3;
  text-align:right;
  letter-spacing:.15px;
}

.brand-wrap{max-width:1220px;margin:0 auto;display:flex;align-items:center;gap:20px}
.brand-logo{height:54px;width:auto;display:block;object-fit:contain;background:#fff;padding:5px 9px;border:1px solid #d8e3ea;border-radius:8px}
header h1{margin:0;font-size:25px}
header h1 span{font-weight:500}
header p{margin:5px 0 0;font-size:12px;color:#687b89;letter-spacing:.2px}
@media(max-width:600px){.brand-wrap{align-items:flex-start;gap:12px}.brand-logo{height:36px}header h1{font-size:21px}}


@media(max-width:600px){
  .card{padding:12px}
  .heading{align-items:flex-start}
  .heading-actions{flex-direction:column-reverse;align-items:flex-end}
  svg{width:100%;height:auto;aspect-ratio:700/270;min-height:0}
}

</style>

function solve(A,b){
 const n=A.length;
 for(let i=0;i<n;i++){
  let m=i;for(let j=i+1;j<n;j++)if(Math.abs(A[j][i])>Math.abs(A[m][i]))m=j;
  [A[i],A[m]]=[A[m],A[i]];[b[i],b[m]]=[b[m],b[i]];
  const p=Math.abs(A[i][i])<1e-15?1e-15:A[i][i];
  for(let k=i;k<n;k++)A[i][k]/=p;b[i]/=p;
  for(let j=0;j<n;j++)if(j!==i){const f=A[j][i];for(let k=i;k<n;k++)A[j][k]-=f*A[i][k];b[j]-=f*b[i]}
 }return b;
}
function polyfit(xs,ys,order){
 const n=order+1,A=Array.from({length:n},()=>Array(n).fill(0)),b=Array(n).fill(0);
 for(let r=0;r<n;r++){for(let c=0;c<n;c++)A[r][c]=xs.reduce((s,x)=>s+x**(r+c),0);b[r]=xs.reduce((s,x,i)=>s+ys[i]*x**r,0)}
 return solve(A,b);
}
function peval(c,x){return c.reduce((s,a,i)=>s+a*x**i,0)}
function cleanPoints(xs,ys){

 return out.sort((a,b)=>a.x-b.x);
}
function fitCurve(curve,key,order,scaleQ=1,scaleY=1){
 const pts=cleanPoints(curve.flow,curve[key]).map(p=>({x:p.x*scaleQ,y:p.y*scaleY}));
 const ord=Math.min(order,pts.length-1);
 const c=polyfit(pts.map(p=>p.x),pts.map(p=>p.y),ord);
 return {pts,c,order:ord,min:pts[0].x,max:pts.at(-1).x};
}
function nice(v,targetIntervals=5){
 const value=Math.max(Number(v)||0,1e-9);
 const minIntervals=4; // at least 5 labels including zero
 const maxIntervals=7;
 const preferred=[1,2,2.5,5,10];
 const raw=value/targetIntervals;
 const exponent=Math.floor(Math.log10(raw));
 const candidates=[];
 for(let e=exponent-1;e<=exponent+2;e++){
  const magnitude=10**e;
  for(const n of preferred)candidates.push(n*magnitude);
 }
 let best=null;
 for(const step of candidates){
  if(!(step>0))continue;
  const max=Math.ceil(value/step-1e-12)*step;
  const intervals=Math.round(max/step);
  if(intervals<minIntervals||intervals>maxIntervals)continue;
  const score=Math.abs(intervals-targetIntervals)+(max-value)/Math.max(value,1e-9)*0.35;
  if(!best||score<best.score)best={step,max,score};
 }
 if(!best){
  const step=10**exponent;
  best={step,max:Math.ceil(value/step)*step};
 }
 const precision=Math.max(0,-Math.floor(Math.log10(best.step))+1);
 return{step:+best.step.toFixed(precision+2),max:+best.max.toFixed(precision+2)};
}
function fmtTick(v){
 const a=Math.abs(v);
 if(a>=1000)return String(Math.round(v));
 if(a>=10)return Number(v.toFixed(1)).toString();
 return Number(v.toFixed(2)).toString();
}
function effAxis(v){return v<50?{step:10,max:50}:v<=80?{step:20,max:80}:{step:20,max:100}}
function graph(fit,axis,ylabel,dq,dv,labelOrder,chartTitle,metricLabel='',chartHeight=270){
 const W=700,H=chartHeight;

   s+=`<text x="${xx}" y="${H-p.b+21}" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#718096">${fmtTick(a)}</text>`;
 }

   const yy=y(a);

 }

   const q=fit.min+(fit.max-fit.min)*i/180;

 }

 }

 s+=`<text transform="translate(23 ${(p.t+H-p.b)/2}) rotate(-90)" text-anchor="middle" font-family="Arial, sans-serif" font-size="11.5" font-weight="700" fill="#546274">${ylabel}</text>`;
 return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${s}</svg>`;
}

function parseImpellerMix(m){
 const total=Number(m.totalImpellers||m.stages||1);
 const full=Number(m.fullImpellers!=null?m.fullImpellers:total);
 const small=Number(m.smallImpellers||0);
 const smallest=Number(m.smallestImpellers||0);
 return {total,full,small,smallest,type:smallest>0?3:(small>0?2:1)};
}

function fitMixedHeadCurve(curve,mix,r){
 if(!curve.head_per_stage)return null;
 if(mix.small>0 && !curve.head_per_stage_2)return null;
 if(mix.smallest>0 && !curve.head_per_stage_3)return null;
 const pts=[]; const seen=new Set();
 for(let i=0;i<curve.flow.length;i++){
   const q0=curve.flow[i], hf=curve.head_per_stage[i];
   const hs=mix.small>0?curve.head_per_stage_2[i]:0;
   const hss=mix.smallest>0?curve.head_per_stage_3[i]:0;
   if(q0==null||hf==null||!isFinite(q0)||!isFinite(hf))continue;
   if(mix.small>0&&(hs==null||!isFinite(hs)))continue;
   if(mix.smallest>0&&(hss==null||!isFinite(hss)))continue;
   const key=Number(q0).toFixed(6); if(seen.has(key))continue; seen.add(key);
   pts.push({x:q0*r,y:((mix.full*hf)+(mix.small*hs)+(mix.smallest*hss))*r*r});
 }
 pts.sort((a,b)=>a.x-b.x);
 if(pts.length<3)return null;
 const order=Math.min(2,pts.length-1);
 return {pts,c:polyfit(pts.map(p=>p.x),pts.map(p=>p.y),order),order,min:pts[0].x,max:pts[pts.length-1].x};
}

function fitMixedEfficiencyCurve(curve,mix,r){
 if(!curve.efficiency)return null;
 if(mix.small>0 && !curve.efficiency_2)return null;
 if(mix.smallest>0 && !curve.efficiency_3)return null;
 const pts=[]; const seen=new Set();
 for(let i=0;i<curve.flow.length;i++){
   const q0=curve.flow[i], ef=curve.efficiency[i];
   const es=mix.small>0?curve.efficiency_2[i]:0;
   const ess=mix.smallest>0?curve.efficiency_3[i]:0;
   if(q0==null||ef==null||!isFinite(q0)||!isFinite(ef))continue;
   if(mix.small>0&&(es==null||!isFinite(es)))continue;
   if(mix.smallest>0&&(ess==null||!isFinite(ess)))continue;
   const key=Number(q0).toFixed(6); if(seen.has(key))continue; seen.add(key);
   const e=((mix.full*ef)+(mix.small*es)+(mix.smallest*ess))/mix.total;
   pts.push({x:q0*r,y:e});
 }
 pts.sort((a,b)=>a.x-b.x);
 if(pts.length<3)return null;
 const order=Math.min(5,pts.length-1);
 return {pts,c:polyfit(pts.map(p=>p.x),pts.map(p=>p.y),order),order,min:pts[0].x,max:pts[pts.length-1].x};
}

function evaluateModel(m,q,h,hz){
 const curve=DB.curves[m.series]; if(!curve)return null;
 const mix=parseImpellerMix(m);
 const r=hz/DB.base_hz;
 const headFit=fitMixedHeadCurve(curve,mix,r);
 const effFit=fitMixedEfficiencyCurve(curve,mix,r);
 if(!headFit || !effFit || q<headFit.min||q>headFit.max)return null;
 const predHead=peval(headFit.c,q);
 if(!isFinite(predHead)||predHead<=0)return null;
 const npshFit=fitCurve(curve,"npshr",3,r,r*r);
 const eff=Math.max(1,Math.min(100,peval(effFit.c,q)));
 const npsh=Math.max(0,peval(npshFit.c,q));
 const shaft=9.81*q*predHead/3600/(eff/100);
 const powerPts=headFit.pts.map(p=>{
   const e=Math.max(1,Math.min(100,peval(effFit.c,p.x)));
   return {x:p.x,y:9.81*p.x*p.y/3600/(e/100)};
 });
 const powerOrder=Math.min(6,powerPts.length-1);
 const powerFit={pts:powerPts,c:polyfit(powerPts.map(p=>p.x),powerPts.map(p=>p.y),powerOrder),order:powerOrder,min:headFit.min,max:headFit.max};
 return {...m,impellerCurve:mix.type,impellerMix:mix,predHead,margin:predHead-h,eff,npsh,shaft,headFit,effFit,npshFit,powerFit,rpm:(Number(curve.speed_rpm)||2900)*r};
}

function renderSelected(){
 const best=selectionState.models[selectionState.selectedIndex];
 const {q,h,hz}=selectionState;
 const requiredEff=Math.max(1,Math.min(100,peval(best.effFit.c,q)));
 const requiredPower=9.81*q*h/3600/(requiredEff/100);
 const requiredNpsh=Math.max(0,peval(best.npshFit.c,q));
 const maxH=Math.max(...best.headFit.pts.map(p=>p.y),h);
 const maxP=Math.max(...best.powerFit.pts.map(p=>p.y),requiredPower);
 const maxN=Math.max(...best.npshFit.pts.map(p=>p.y),requiredNpsh);
 const above=hz>50?'<div class="warning">Above 50 Hz: verify motor power, VFD voltage, maximum rpm, pressure rating and manufacturer approval.</div>':'';
 out.innerHTML=`<div class="heading"><div><h2 style="margin:0">${best.model}</h2><div>${best.series} · ${best.stages} stage${best.stages>1?'s':''} · ${best.connection}</div></div><div class="heading-actions"><button class="export-btn" onclick="exportPDF()">EXPORT PDF</button><div class="badge">${hz.toFixed(1)} Hz</div></div></div>
 ${above}
 <div class="kpis">
 <div class="kpi"><span>Required head</span><b>${h.toFixed(2)} m</b><span>at required flow</span></div>
 <div class="kpi"><span>Efficiency</span><b>${requiredEff.toFixed(1)}%</b><span>at required flow</span></div>
 <div class="kpi"><span>Shaft power</span><b>${requiredPower.toFixed(2)} kW</b><span>${(requiredPower/0.746).toFixed(1)} HP</span></div>
 <div class="kpi"><span>Motor size</span><b>${best.motor_kw.toFixed(2)} kW</b><span>${best.motor_hp.toFixed(2)} HP</span></div>
 <div class="kpi"><span>NPSHr</span><b>${requiredNpsh.toFixed(2)} m</b><span>at required flow</span></div>
 <div class="kpi"><span>Adjusted speed</span><b>${best.rpm.toFixed(0)} rpm</b><span>base ${(Number(DB.curves[best.series].speed_rpm)||2900).toFixed(0)} rpm</span></div>
 <div class="kpi"><span>Required duty</span><b>${q.toFixed(1)} m³/h</b><span>${h.toFixed(1)} m</span></div>
 <div class="kpi"><span>Pressure limits</span><b>${best.max_pressure_bar.toFixed(0)} bar</b><span>inlet ${best.max_inlet_bar.toFixed(0)} bar</span></div></div>
 ${graph(best.headFit,nice(maxH,5),"Head (m)",q,h,2,"Head Curve")}
 ${graph(best.effFit,effAxis(Math.max(...best.effFit.pts.map(p=>p.y))),"Efficiency (%)",q,requiredEff,6,"Efficiency Curve")}
 ${graph(best.powerFit,nice(maxP,5),"Power (kW)",q,requiredPower,6,"Shaft Power Curve")}
 ${graph(best.npshFit,nice(maxN,5),"NPSHr (m)",q,requiredNpsh,3,"NPSHr Curve")}
 <p class="small"></p><div class="iso-note">ISO 9906 Grade 3B</div>`;
}

function run(){
 const rawFlow=+flow.value,rawHead=+head.value,flowUnit=fu.value,headUnit=hu.value;
 let q=flowToM3h(rawFlow,flowUnit),h=headToM(rawHead,headUnit),hz=+document.getElementById("hz").value;
 if(!(q>0&&h>0&&hz>=20&&hz<=60)){
   out.innerHTML='<div class="warning">Please check the input values.</div>';
   alternatives.innerHTML='';
   return;
 }
 let all=DB.models.map(m=>evaluateModel(m,q,h,hz)).filter(x=>x&&x.margin>=-0.01&&x.motor_kw+1e-9>=x.shaft);
 if(!all.length)all=DB.models.map(m=>evaluateModel(m,q,h,hz)).filter(x=>x&&x.margin>=-0.01);
 if(!all.length){
   out.innerHTML=`<div class="warning">No CHC model in the workbook range can meet ${q.toFixed(1)} m³/h @ ${h.toFixed(1)} m at ${hz.toFixed(1)} Hz.</div>`;
   alternatives.innerHTML='';
   return;
 }
 all.sort((a,b)=>{
   if(Math.abs(a.motor_kw-b.motor_kw)>1e-9)return a.motor_kw-b.motor_kw;
   if(Math.abs(b.eff-a.eff)>0.05)return b.eff-a.eff;
   return a.margin-b.margin;
 });
 selectionState={q,h,hz,rawFlow,rawHead,flowUnit,headUnit,models:all,selectedIndex:0};
 renderAlternatives();
 renderSelected();
}
go.onclick=run;
run();
</script>
